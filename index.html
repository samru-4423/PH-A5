<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn</title>

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-base-200 p-20">
    <div class="w-[35%] mx-auto bg-white p-10 rounded-sm">
        <div class="text-center pb-5">
            <img src="assets/github-logo.png" alt="" class="w-[30%] m-auto">
            <h2 class="text-3xl font-semibold pt-3">GitHub Issues Tracker</h2>
            <p class="text-gray-400 text-[18px]">Sign in to manage your issues</p>
        </div>

        <div class="">
            <label for="" class="text-[18px]">Username</label><br>
            <input id="username" type="text" class="w-full h-[40px] border-gray-300 pl-3 pr-3 mt-1 mb-1 rounded-sm"
                placeholder="Enter username">
            <p class="text-blue-600">Default: admin</p>

            <br>

            <label for="" class="text-[18px]">Password</label><br>
            <input id="pass" type="text" class="w-full h-[40px] border-gray-300 pl-3 pr-3 mt-1 mb-1 rounded-sm"
                placeholder="Enter password">
            <p class="text-blue-600">Default: admin123</p>

            <br>

            <button id="login-btn" class="btn w-full h-[45px] bg-blue-500 text-[15px] text-white font-normal mb-10">Sign In</button>

            <br>

            <hr class="border-1 border-gray-200">
            <p class="text-center mx-auto -mt-3 w-[8%] bg-white mb-5">OR</p>

            <p class="text-gray-400 text-center mb-1">Demo Credentials:</p>
            <div class="text-center bg-slate-100 py-5 rounded-md">
                <p> <span class="font-semibold">Username: </span>admin </p>
                <p> <span class="font-semibold">Password: </span>admin123 </p>
            </div>
        </div>
    </div>

    <script src="scripts/login.js"></script>
</body>

</html>
