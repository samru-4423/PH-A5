<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issues-Tracker</title>

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- icons -->

        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-base-300 h-auto pb-7">
    <main>
        <header class="bg-white w-full flex justify-between px-20 py-3">
            <div class="flex items-center gap-1">
                <img src="assets/github-logo.png" alt="" class="w-10">
                <h2 class="text-[30px] font-semibold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex items-center  ">
                <div>
                    <i class="fa-brands fa-sistrix -mr-9"></i>
                    <input type="text" placeholder="Search issues..."
                        class="w-full h-[40px] border-gray-300 border-1 pl-9 pr-2 mt-1 mb-1 rounded-sm ">
                </div>
                <div class="flex items-center">
                    <button class="btn bg-blue-500 text-white font-light"><span class="text-[20px] ">&#43</span>New
                        Issue</button>
                </div>
            </div>

        </header>

        <section class="w-[70%] mx-auto mt-15">
            <div class=" bg-white p-4 space-x-1 mb-5 rounded-md">
                <button id="all-btn" onclick="filterIssues('all')" class="btn w-[8%] h-[32px] bg-blue-600 text-white font-normal">All</button>
                <button id="open-btn" onclick="filterIssues('open')" class="btn w-[8%] h-[32px] bg-white font-normal">Open</button>
                <button id="closed-btn" onclick="filterIssues('closed')" class="btn w-[8%] h-[32px] bg-white font-normal">Closed</button>
            </div>

            <div class=" bg-white p-4 rounded-t-md">
                <div class="flex justify-between">
                    <div class="flex items-center space-x-1">
                        <div>
                            <img src="assets/Aperture.png" alt="" class="bg-slate-200 p-2 rounded-full">
                        </div>
                        <div>
                            <p id="total" class="font-semibold">50 Issues</p>
                            <p class="text-gray-400 text-[13px]">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex items-center space-x-2 -mt-1">
                        <span class="text-[30px] text-green-700">&bullet;</span>
                        <p>Open</p>
                        <span class="text-[30px] text-purple-700">&bullet;</span>
                        <p>Closed</p>
                    </div>
                </div>

            </div>
            <hr class="border-1 border-gray-200">

            <div id="issues-container" class="grid grid-cols-4 w-full bg-base-200 gap-2 p-5 rounded-b-md">
                <!-- <div class="w-full bg-white p-3 rounded-md">
                    <div class="flex justify-between items-center mb-2">

                </div> -->
            </div>
        </section>

        <dialog id="modalId" class="modal modal-bottom sm:modal-middle">
            <div class="modalBox">
                <div id="details-card" class="">
                    <div class="">

                    </div>\
                </div>

                <div class="modal-action">
                    <form method="dialog">
\                       <button class="btn bg-purple-900">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    <script src="scripts/issue-track.js"></script>
